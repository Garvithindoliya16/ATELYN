<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order | ATELYN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --atelyn-gold: #D4AF37;
            --text-main: #ffffff;
            --font-header: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-body); }
        
        nav { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo { font-family: var(--font-header); font-size: 1.5rem; color: var(--atelyn-gold); text-decoration: none; letter-spacing: 4px; }

        .track-container { max-width: 600px; margin: 100px auto; padding: 40px; background: #0a0a0a; border: 1px solid #222; text-align: center; }
        h1 { font-family: var(--font-header); color: var(--atelyn-gold); letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #666; display: block; margin-bottom: 10px; }
        input { width: 100%; background: #111; border: 1px solid #333; padding: 15px; color: #fff; outline: none; }
        input:focus { border-color: var(--atelyn-gold); }

        .track-btn { width: 100%; background: var(--atelyn-gold); color: #000; padding: 18px; border: none; font-weight: 600; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">ATELYN</a></nav>
    <div class="track-container">
        <h1>Track Order</h1>
        <p>Enter your order details to see your status.</p>
        <div class="input-group">
            <label>Order ID</label>
            <input type="text" placeholder="e.g. AT-123456">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="email@example.com">
        </div>
        <button class="track-btn">Track Status</button>
    </div>
</body>
</html>
