<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & Launches | ATELYN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #050505; --atelyn-gold: #D4AF37; --font-header: 'Playfair Display', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: #fff; font-family: 'Montserrat', sans-serif; }
        
        .events-header { padding: 80px 8% 40px; text-align: center; }
        .events-header h1 { font-family: var(--font-header); font-size: 2.5rem; color: var(--atelyn-gold); letter-spacing: 5px; text-transform: uppercase; }

        .event-card { display: flex; background: #0a0a0a; border: 1px solid #222; margin: 0 8% 40px; overflow: hidden; }
        .event-img { flex: 1; height: 350px; background: #111; }
        .event-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .event-info { flex: 1; padding: 50px; }
        .event-info h2 { color: var(--atelyn-gold); font-family: var(--font-header); margin-bottom: 15px; }
        .event-info p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        .event-meta { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="events-header"><h1>Events & Launches</h1></div>
    <div class="event-card">
        <div class="event-img"><img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=800&q=80"></div>
        <div class="event-info">
            <div class="event-meta">Upcoming | New Delhi</div>
            <h2>Signature Collection Drop</h2>
            <p>Experience the pursuit of excellence with our latest limited drop. Join us for an exclusive brand activation event.</p>
            <a href="#" style="color: var(--atelyn-gold); text-decoration: none; font-size: 0.8rem; font-weight: 600;">REGISTER NOW</a>
        </div>
    </div>
</body>
</html>
