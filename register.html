<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ATELYN | Premium Fashion Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-accent: #0f0f0f;
            --atelyn-gold: #D4AF37;
            --text-main: #ffffff;
            --font-header: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        /* Background Element */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1920&q=80') center/cover;
            z-index: -1;
        }

        .auth-container { width: 100%; max-width: 450px; padding: 40px; background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); }

        .auth-header { text-align: center; margin-bottom: 40px; }
        .logo { font-family: var(--font-header); font-size: 2rem; letter-spacing: 6px; color: var(--atelyn-gold); text-decoration: none; display: block; margin-bottom: 10px; }
        .auth-header p { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 8px; }
        input { 
            width: 100%; background: #111; border: 1px solid #333; padding: 15px; 
            color: #fff; outline: none; transition: 0.3s; font-family: var(--font-body);
        }
        input:focus { border-color: var(--atelyn-gold); }

        .register-btn { 
            width: 100%; background: var(--atelyn-gold); color: #000; padding: 18px; 
            border: none; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .register-btn:hover { background: #fff; transform: translateY(-2px); }

        .auth-footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #666; }
        .auth-footer a { color: var(--atelyn-gold); text-decoration: none; transition: 0.3s; }
        .auth-footer a:hover { color: #fff; }

        .club-invite { margin-top: 25px; padding-top: 25px; border-top: 1px solid #222; text-align: center; font-size: 0.7rem; color: #444; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <main class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo">ATELYN</a>
            <p>Create Your Identity</p>
        </div>

        <form action="#" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="register-btn">Join ATELYN</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>

        <div class="club-invite">
            By joining, you become part of the ATELYN Exclusive Club, gaining early access to limited drops and signature collections [cite: 287-288].
        </div>
    </main>

</body>
</html>
