<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled By You | ATELYN Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --atelyn-gold: #D4AF37;
            --text-main: #ffffff;
            --font-header: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        /* Navigation Inherited */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(5, 5, 5, 0.95);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .logo { font-family: var(--font-header); font-size: 1.5rem; letter-spacing: 4px; color: var(--atelyn-gold); text-decoration: none; }


        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-body); }

        /* Page Header */
        .comm-header { padding: 80px 8% 40px; text-align: center; }
        .comm-header h1 { font-family: var(--font-header); font-size: 2.5rem; color: var(--atelyn-gold); letter-spacing: 5px; text-transform: uppercase; }
        .comm-header p { font-size: 0.9rem; color: #888; margin-top: 10px; letter-spacing: 2px; }

        /* Upload Section [cite: 358] */
        .upload-banner { background: #0a0a0a; border-top: 1px solid #222; border-bottom: 1px solid #222; padding: 40px; text-align: center; margin-bottom: 60px; }
        .upload-btn { background: var(--atelyn-gold); color: #000; padding: 15px 30px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* Community Gallery [cite: 351, 361] */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 0 8% 100px; }
        .gallery-item { position: relative; height: 400px; overflow: hidden; background: #111; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .gallery-item:hover img { opacity: 1; transform: scale(1.05); }
        .user-tag { position: absolute; bottom: 20px; left: 20px; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.6); padding: 5px 10px; }

        
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ATELYN</a>
    </nav>
    <div class="comm-header">
        <h1>Styled By You</h1>
        <p>The ATELYN Tribe | Real Stories, Real Style</p>
    </div>

    <div class="upload-banner">
        <p style="margin-bottom: 20px; font-size: 0.8rem;">Showcase your distinction. Upload your look to be featured.</p>
        <a href="#" class="upload-btn">Upload Your Look</a>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1512485800893-b08ec1ea59b1?auto=format&fit=crop&w=600&q=80">
            <div class="user-tag">@Modern_Ambition</div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1505022610485-0249ba5b3675?auto=format&fit=crop&w=600&q=80">
            <div class="user-tag">@Elegance_Daily</div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?auto=format&fit=crop&w=600&q=80">
            <div class="user-tag">@Atelyn_Class</div>
        </div>
    </div>
</body>
</html>
